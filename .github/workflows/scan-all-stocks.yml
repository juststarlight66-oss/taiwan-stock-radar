name: scan-all-stocks

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-scan even on non-trading day'
        required: false
        default: 'true'
  schedule:
    # Every Monday 09:15 CST (UTC+8) = 01:15 UTC
    - cron: '15 1 * * 1'

jobs:
  scan-all-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run full market scan
        run: python tasks/scan_all_stocks.py
        env:
          OUTPUT_PATH: public/data/all_scores.json
          FORCE: ${{ github.event.inputs.force || 'false' }}

      - name: Show output stats
        run: |
          echo "=== all_scores.json size ==="
          wc -c public/data/all_scores.json || echo "File not found"
          echo "=== Stock count ==="
          python3 -c "import json,sys; d=json.load(open('public/data/all_scores.json')); stocks=d if isinstance(d,list) else d.get('all_stock_scores',[]); print(f'{len(stocks)} stocks scanned')" || echo "Parse error"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/all_scores.json
          git diff --staged --quiet || git commit -m "data: full scan update all_scores.json $(date '+%Y-%m-%d %H:%M CST')"
          git push
