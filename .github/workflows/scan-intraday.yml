name: Scan Intraday

on:
  workflow_dispatch:
  schedule:
    # 每交易日台灣時間 13:05 執行 (UTC 05:05)
    - cron: '5 5 * * 1-5'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run intraday scan
        run: python tasks/intraday/fetch_intraday.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/intraday*.json || true
          git diff --cached --quiet || git commit -m "data: intraday scan $(date +%Y%m%d-%H%M)"
          git push
