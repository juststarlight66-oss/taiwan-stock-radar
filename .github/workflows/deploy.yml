name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate all_stocks_index.json
        run: |
          python3 - << 'EOF'
          import json, os

          src = 'public/data/all_scores.json'
          dst = 'public/data/all_stocks_index.json'

          if not os.path.exists(src):
              print(f'[skip] {src} not found, skipping index generation')
              exit(0)

          with open(src, 'r', encoding='utf-8') as f:
              data = json.load(f)

          # Support both flat array format and object format
          if isinstance(data, list):
              stocks = data
              scan_date = ''
              scanned_count = len(stocks)
          else:
              stocks = data.get('all_stock_scores', data.get('stocks', []))
              scan_date = data.get('scan_date', '')
              scanned_count = data.get('scanned_count', len(stocks))

          index = {
              'scan_date': scan_date,
              'scanned_count': scanned_count,
              'stocks': [
                  {
                      'stock_id': s.get('stock_id', ''),
                      'name': s.get('stock_name', s.get('name', '')),
                      'sector': s.get('sector', ''),
                      'close': s.get('close', 0),
                      'change_pct': s.get('change_pct', 0),
                      'total_score': s.get('total_score', 0),
                      'recommendation': s.get('recommendation', s.get('strategy', {}).get('recommendation', '') if isinstance(s.get('strategy'), dict) else ''),
                  }
                  for s in stocks
              ]
          }

          with open(dst, 'w', encoding='utf-8') as f:
              json.dump(index, f, ensure_ascii=False, separators=(',', ':'))

          size_kb = os.path.getsize(dst) // 1024
          print(f'[ok] Generated {dst}: {len(index["stocks"])} stocks, {size_kb} KB')
          EOF

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: TypeScript Check
        run: npx tsc --noEmit 2>&1 | head -200 || true

      - name: Build
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: false
