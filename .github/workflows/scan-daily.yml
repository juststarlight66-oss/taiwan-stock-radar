name: Daily Market Scan

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 每日台灣時間 19:00（UTC+8 = UTC 11:00），僅週一至週五
  workflow_dispatch:
    inputs:
      scan_date:
        description: 'Scan date YYYYMMDD'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pytz numpy pandas scikit-learn yfinance beautifulsoup4 lxml httpx

      - name: Create shared stub
        run: |
          mkdir -p /home/runner/work/tasks/shared
          echo "def run_backtest(stock_id, strategy='all', days=60): return {}" > /home/runner/work/tasks/shared/per_stock_backtest.py

      - name: Run scan
        run: python tasks/2255/scan_market.py
        env:
          PYTHONPATH: /home/runner/work

      - name: Copy and update data files
        run: python tasks/2255/post_scan.py

      - name: Run E3 Backtest
        run: |
          python backtest_engine.py \
            --strategy all \
            --days 252 \
            --output e3_backtest_$(date +%Y%m%d).json

      - name: Stage E3 results for gh-pages
        run: |
          mkdir -p gh-pages
          cp e3_backtest_*.json gh-pages/ 2>/dev/null || true

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/data/ tasks/2255/scan_result.json tasks/2255/all_scores.json tasks/2255/latest.json e3_backtest_*.json gh-pages/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: $(date +%Y%m%d) evening scan + E3 backtest (auto)"
          git push origin main

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
