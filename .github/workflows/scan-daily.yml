name: Daily Market Scan Manual

on:
  workflow_dispatch:
    inputs:
      scan_date:
        description: 'Scan date YYYYMMDD'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pytz numpy pandas

      - name: Run scan
        run: python tasks/2255/scan_market.py

      - name: Copy and update data files
        run: python tasks/2255/post_scan.py

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/data/ tasks/2255/scan_result.json tasks/2255/all_scores.json tasks/2255/latest.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: 20260508 evening scan (v7.1)"
          git push origin main

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
